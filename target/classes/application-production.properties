spring.application.name=sonata-viajes

# Base de datos - Railway PostgreSQL
# Railway inyecta estas variables automaticamente desde el plugin de PostgreSQL
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - optimizado para Railway
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA - sin logging en produccion
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Servidor - Railway asigna PORT automaticamente
server.port=${PORT}

# CORS - URL de Firebase Hosting (configurar en Railway Variables)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
