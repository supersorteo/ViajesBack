spring.application.name=sonata-viajes

# Base de datos - Railway PostgreSQL
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Servidor
server.port=${PORT}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Admin
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:drd37bhg0}
cloudinary.api-key=${CLOUDINARY_API_KEY:369781325274234}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:iWVO8xwXsJrDxUC-c8BlDyjATZ4}
